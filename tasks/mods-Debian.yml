---
- name: list installed modules
  ansible.builtin.shell: 'ls {{ nginx_mods_path }} | sed "s/\.so$//"'
  check_mode: false
  changed_when: false
  register: lsmods
  tags: nginx, config

- name: nginx modules to install
  ansible.builtin.apt:
    name: '{{ module | regex_replace("ngx_","libnginx-") | regex_replace("_","-") }}'
    state: present
  with_items: '{{ nginx_modules }}'
  loop_control:
    loop_var: module
  when: module not in lsmods.stdout_lines
  notify: restart nginx
  tags: nginx, config

