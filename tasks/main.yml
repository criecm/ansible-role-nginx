---
- name: OS vars
  ansible.builtin.include_vars: '{{ item }}'
  with_first_found:
    - '{{ ansible_os_family }}.yml'
  tags: vars, nginx

- name: default confs
  block:
    - name: servers.d dir
      ansible.builtin.file:
        dest: '{{ nginx_etcdir }}/{{ item }}'
        state: directory
        mode: '0750'
        owner: root
      with_items:
        - servers.d
        - modules.d
        - conf.d
      notify: restart nginx
    - name: default config
      ansible.builtin.template:
        src: nginx.conf.j2
        dest: '{{ nginx_etcdir }}/nginx.conf'
      notify: restart nginx
    - name: default config parts
      ansible.builtin.template:
        src: '{{ item }}.j2'
        dest: '{{ nginx_etcdir }}/{{ item }}'
        force: no
      with_items:
        - servers.d/0default.conf
      notify: restart nginx
      when: nginx_default_site | default("default") == "default"
  tags: nginx, config

- name: OS tasks
  ansible.builtin.include_tasks: '{{ item }}'
  with_first_found:
    - 'install-{{ ansible_os_family }}.yml'
  tags: vars, nginx

# logs dir
- name: log dir
  ansible.builtin.file:
    dest: '{{ nginx_log_dir }}'
    mode: '0755'
    state: directory
  when: 'nginx_log_dir != ""'
  tags: nginx, config

- name: get nginx config
  ansible.builtin.command: 'nginx -V'
  failed_when: false
  check_mode: false
  changed_when: false
  register: nginx_v

- name: fact has_status
  ansible.builtin.set_fact:
    has_status: '{% if nginx_v.stderr is search("--with-http_stub_status_module") %}{{ true }}{% else %}{{ false }}{% endif %}'
    has_sticky_ng: '{% if nginx_v.stderr is search("nginx-sticky-module-ng") %}{{ true }}{% else %}{{ false }}{% endif %}'
    nginx_version: '{{ nginx_v.stderr_lines | select("match","nginx version:") | first | regex_replace("^.*/","") }}'

- name: reverse-proxy
  block:
    - name: config reverse-proxy
      ansible.builtin.lineinfile:
        dest: '{{ nginx_etcdir }}/fastcgi_params'
        line: '{{ item.line }}'
        regexp: '{{ item.regexp }}'
        state: present
      with_items:
        - { line: 'fastcgi_param  HTTPS $myhttps if_not_empty;', regexp: '^fastcgi_param\s+HTTPS' }
        - { line: 'fastcgi_param  REQUEST_SCHEME $myscheme if_not_empty;', regexp: '^fastcgi_param\s+REQUEST_SCHEME' }
        - { line: 'fastcgi_param  SERVER_PORT $myport if_not_empty;', regexp: '^fastcgi_param\s+SERVER_PORT' }
      notify: restart nginx
    - name: realip.conf
      ansible.builtin.template:
        src: realip.conf.j2
        dest: '{{ nginx_etcdir }}/conf.d/realip.conf'
      notify: restart nginx
  when: 'proxified_by | count() > 0'
  tags: nginx, config

- name: OS modules
  ansible.builtin.include_tasks: '{{ item }}'
  with_first_found:
    - 'mods-{{ ansible_os_family }}.yml'
  tags: nginx,config

- name: modules.d/ confs
  ansible.builtin.template:
    src: '{{ item }}'
    dest: '{{ nginx_etcdir }}/modules.d/{{ item | basename | regex_replace("\.j2$","") }}'
    mode: '0640'
    group: '{{ www_group }}'
  with_items: '{{ nginx_mods_includes }}'
  notify: restart nginx
  tags: nginx, config

- name: nginx_includes
  ansible.builtin.template:
    src: '{{ item }}'
    dest: '{{ nginx_etcdir }}/conf.d/{{ item | basename | regex_replace("\.j2$","") }}'
    mode: '0640'
    group: '{{ www_group }}'
  with_items: '{{ nginx_includes }}'
  notify: restart nginx
  tags: nginx, config

- name: nginx_files
  ansible.builtin.template:
    src: '{{ item }}'
    dest: '{{ nginx_etcdir }}/{{ item | basename | regex_replace("\.j2$","") }}'
    mode: '0640'
    group: '{{ www_group }}'
  with_items: '{{ nginx_files }}'
  notify: restart nginx
  tags: nginx, config


- name: x509 - global part
  block:
    - name: x509 global config
      ansible.builtin.template:
        src: tls.conf.j2
        dest: '{{ nginx_etcdir }}/conf.d/tls.conf'
        mode: '0644'
    - name: check dhparam
      ansible.builtin.stat:
        path: /etc/ssl/dhparam4096.pem
      register: stat_dh
    - name: create dhparam
      ansible.builtin.command: 'openssl dhparam -out /etc/ssl/dhparam4096.pem 4096'
      when: not stat_dh.stat.exists
    - name: mkdir private
      ansible.builtin.file:
        state: directory
        mode: '0700'
        path: '{{ tls_certs_dir }}/private'
  when: do_tls
  tags: nginx, config

- name: enable nginx
  ansible.builtin.service:
    name: nginx
    enabled: yes
    state: started
  tags: nginx, rc

- name: sites
  ansible.builtin.include_tasks: site.yml
  with_items: '{{ sites }}'
  loop_control:
    loop_var: onesite
  when: '(not "backend" in onesite) and not nginx_sites_done | default(false) and ( mysite == "" or mysite == onesite.id )'
  tags: nginx, sites

- name: monitor tmp var
  ansible.builtin.set_fact:
    tmpmon:
      - proto: http
        name: '{{ ansible_fqdn }}'
        path: /nginx_status
        type: nginx_status

- name: register to_monitor
  ansible.builtin.set_fact:
    to_monitor: '{{ to_monitor | default([]) | union(tmpmon) }}'
    cacheable: yes

- name: debug monitor
  ansible.builtin.debug:
    var: to_monitor
